name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate with ACR
        uses: docker/login-action@v3
        with:
          registry: acrmidtermg5.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: acrmidtermg5.azurecr.io/webapp-midterm-g5:${{ github.sha }},acrmidtermg5.azurecr.io/webapp-midterm-g5:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapp-midterm-g5
          images: acrmidtermg5.azurecr.io/webapp-midterm-g5:${{ github.sha }}
